<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estúdio · CRM</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon-32.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" id="theme-color-meta" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CRM Estúdio">
<script>
  // aplica o tema salvo antes da pintura, pra evitar flash
  document.documentElement.setAttribute("data-theme", localStorage.getItem("crm-theme") || "dark");
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="dark"]{
    --bg:#000000;
    --surface:#0c0c0c;
    --surface-2:#1a1a1a;
    --border:#ffffff22;
    --border-solid:#2b2b2b;
    --text:#ffffff;
    --muted:#a3a3a3;
    --muted-2:#6b6b6b;
    --amber:#ffffff;
    --amber-dim:#ffffff1f;
    --terracotta:#ffffff;
    --green:#ffffff;
    --danger:#ffffff;
    --radius:10px;
    font-size:16px;
  }
  [data-theme="light"]{
    --bg:#ffffff;
    --surface:#ffffff;
    --surface-2:#f0f0f0;
    --border:#00000022;
    --border-solid:#d9d9d9;
    --text:#000000;
    --muted:#5a5a5a;
    --muted-2:#8f8f8f;
    --amber:#000000;
    --amber-dim:#0000000f;
    --terracotta:#000000;
    --green:#000000;
    --danger:#000000;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{ font-family:'Fraunces',serif; }
  a{color:inherit;}
  button{font-family:inherit;}
  ::selection{background:var(--amber-dim);}

  /* ---------- LOGIN ---------- */
  #login-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 0%, #241f16 0%, #16140f 60%);
  }
  .login-card{
    width:min(360px,90vw); padding:40px 32px; background:var(--surface);
    border:1px solid var(--border-solid); border-radius:var(--radius);
    box-shadow:0 30px 60px -30px #000;
  }
  .login-card .eyebrow{ letter-spacing:.14em; text-transform:uppercase; font-size:11px; color:var(--amber); margin-bottom:6px; }
  .login-card h1{ font-size:28px; margin:0 0 24px; font-weight:500; }
  .login-card input{ width:100%; margin-bottom:12px; }
  .login-card button{ width:100%; margin-top:8px; }
  #login-error{ color:var(--danger); font-size:13px; margin-top:10px; min-height:16px; }

  input, select, textarea{
    background:var(--surface-2); border:1px solid var(--border-solid); color:var(--text);
    padding:10px 12px; border-radius:7px; font-size:14px; font-family:'Inter',sans-serif;
  }
  input:focus, select:focus, textarea:focus{ outline:none; border-color:var(--amber); }
  textarea{ resize:vertical; min-height:64px; width:100%; }
  label{ font-size:12px; color:var(--muted); display:block; margin-bottom:5px; }
  .field{ margin-bottom:14px; }
  .field-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  button{
    cursor:pointer; border:1px solid var(--border-solid); background:var(--surface-2);
    color:var(--text); padding:9px 16px; border-radius:7px; font-size:14px; font-weight:500;
    transition:.15s;
  }
  button:hover{ border-color:var(--amber); }
  button.primary{ background:var(--amber); color:var(--bg); border-color:var(--amber); font-weight:600; }
  button.primary:hover{ filter:brightness(0.92); }
  button.danger{ background:transparent; color:var(--text); border-color:var(--text); }
  button.danger:hover{ background:var(--text); color:var(--bg); }
  button.ghost{ background:transparent; border-color:transparent; color:var(--muted); }
  button.ghost:hover{ color:var(--text); border-color:var(--border-solid); }
  button.sm{ padding:5px 10px; font-size:12px; }

  /* ---------- LAYOUT ---------- */
  #app{ display:none; min-height:100vh; }
  #app.active{ display:flex; }

  #sidebar{
    width:230px; flex:0 0 230px; background:var(--surface);
    border-right:1px solid var(--border-solid);
    display:flex; flex-direction:column; padding:22px 14px;
    position:relative;
  }
  /* film perforation signature */
  #sidebar::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:6px;
    background-image:repeating-linear-gradient(to bottom, var(--amber) 0px, var(--amber) 6px, transparent 6px, transparent 18px);
    opacity:.55;
  }
  .brand{ padding:4px 10px 22px; }
  .brand .eyebrow{ font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--amber); }
  .brand h1{ font-size:21px; margin:2px 0 0; font-weight:500; }
  nav{ display:flex; flex-direction:column; gap:2px; flex:1; }
  nav button{
    text-align:left; background:transparent; border:none; color:var(--muted);
    padding:10px 12px; border-radius:7px; font-size:14px; display:flex; align-items:center; gap:10px;
  }
  nav button .dot{ width:6px; height:6px; border-radius:50%; background:var(--muted-2); flex:0 0 auto; }
  nav button:hover{ background:var(--surface-2); color:var(--text); }
  nav button.active{ background:var(--amber-dim); color:var(--amber); }
  nav button.active .dot{ background:var(--amber); }
  .sidebar-footer{ font-size:12px; color:var(--muted-2); padding:10px 12px; }
  .sidebar-footer .footer-row{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .theme-toggle{
    display:flex; align-items:center; justify-content:center; width:32px; height:32px; padding:0;
    border-radius:50%; flex:0 0 auto; font-size:15px;
  }
  .sidebar-footer button.ghost{ width:auto; margin-top:0; }
  .sidebar-backdrop{ display:none; }

  /* mobile topbar (hidden on desktop) */
  #mobile-topbar{ display:none; }

  #main{ flex:1; padding:32px 40px; overflow-y:auto; height:100vh; }
  .page-header{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
  .page-header .eyebrow{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--amber); margin-bottom:4px; }
  .page-header h2{ font-size:26px; margin:0; font-weight:500; }
  .page-actions{ display:flex; gap:10px; }

  .grid{ display:grid; gap:16px; }
  .grid-3{ grid-template-columns:repeat(3,1fr); }
  .grid-4{ grid-template-columns:repeat(4,1fr); }
  @media (max-width:1100px){ .grid-3,.grid-4{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:560px){ .grid-3,.grid-4{ grid-template-columns:1fr; } }

  /* ============ MOBILE LAYOUT (<900px) ============ */
  @media (max-width:900px){
    #app.active{ display:block; }
    #mobile-topbar{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      position:sticky; top:0; z-index:30; background:var(--surface);
      border-bottom:1px solid var(--border-solid); padding:14px 16px;
    }
    #mobile-topbar .brand-mini{ font-family:'Fraunces',serif; font-size:17px; }
    #mobile-topbar button{ padding:7px 10px; }

    #sidebar{
      position:fixed; top:0; left:0; bottom:0; z-index:50; width:78vw; max-width:280px;
      transform:translateX(-100%); transition:transform .25s ease; box-shadow:20px 0 40px -10px #0008;
    }
    #sidebar.open{ transform:translateX(0); }
    .sidebar-backdrop{
      display:none; position:fixed; inset:0; background:#0c0a07b3; z-index:40;
    }
    .sidebar-backdrop.open{ display:block; }

    #main{ padding:18px 16px 60px; height:auto; }
    .page-header h2{ font-size:22px; }
    table{ font-size:13px; }
    thead th, tbody td{ padding:8px 6px; }
    .modal{ padding:20px; }
    .field-row{ grid-template-columns:1fr; }
  }

  .card{
    background:var(--surface); border:1px solid var(--border-solid); border-radius:var(--radius);
    padding:18px 20px;
  }
  .stat-card .label{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:8px; }
  .stat-card .value{ font-family:'Fraunces',serif; font-size:28px; }
  .stat-card .sub{ font-size:12px; color:var(--muted-2); margin-top:4px; }

  .section-title{ font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:28px 0 12px; }

  table{ width:100%; border-collapse:collapse; font-size:14px; }
  thead th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted-2);
    padding:8px 10px; border-bottom:1px solid var(--border-solid);
  }
  tbody td{ padding:11px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tbody tr:hover{ background:var(--surface-2); }
  .row-actions{ display:flex; gap:6px; justify-content:flex-end; }

  .badge{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; border:1px solid var(--border-solid); }
  .badge.lead{ background:transparent; color:var(--muted-2); border-style:dashed; }
  .badge.orcamento{ background:transparent; color:var(--muted); }
  .badge.negociacao{ background:color-mix(in srgb, var(--text) 28%, transparent); color:var(--text); }
  .badge.fechado{ background:color-mix(in srgb, var(--text) 14%, transparent); color:var(--text); }
  .badge.realizado{ background:color-mix(in srgb, var(--text) 45%, transparent); color:var(--text); }
  .badge.entregue{ background:var(--text); color:var(--bg); border-color:var(--text); }
  .badge.perdido{ background:transparent; color:var(--muted-2); border-style:dashed; text-decoration:line-through; }
  .badge.lead-novo{ background:transparent; color:var(--muted); border-style:dashed; }
  .badge.lead-contatado{ background:color-mix(in srgb, var(--text) 14%, transparent); color:var(--text); }
  .badge.lead-negociando{ background:color-mix(in srgb, var(--text) 32%, transparent); color:var(--text); }
  .badge.lead-convertido{ background:var(--text); color:var(--bg); border-color:var(--text); }
  .badge.lead-perdido{ background:transparent; color:var(--muted-2); border-style:dashed; text-decoration:line-through; }
  .tag-chip{ display:inline-block; background:var(--surface-2); border:1px solid var(--border-solid); color:var(--muted); font-size:11px; padding:2px 8px; border-radius:20px; margin:2px 3px 0 0; }

  .empty-state{ text-align:center; padding:50px 20px; color:var(--muted-2); }
  .empty-state .serif{ font-size:18px; color:var(--muted); margin-bottom:6px; }

  /* Modal */
  .modal-backdrop{
    position:fixed; inset:0; background:#0c0a07cc; display:none; align-items:center; justify-content:center;
    z-index:50; padding:24px;
  }
  .modal-backdrop.active{ display:flex; }
  .modal{
    width:min(560px,100%); max-height:88vh; overflow-y:auto; background:var(--surface);
    border:1px solid var(--border-solid); border-radius:var(--radius); padding:26px 28px;
  }
  .modal h3{ font-size:20px; margin:0 0 18px; font-weight:500; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:18px; border-top:1px solid var(--border); padding-top:16px; }

  .view-row{ display:flex; justify-content:space-between; gap:16px; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .view-row:last-child{ border-bottom:none; }
  .view-label{ color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; flex:0 0 auto; padding-top:2px; }
  .view-value{ text-align:right; max-width:64%; }
  .view-value a{ color:var(--text); text-decoration:underline; }
  .view-link-card{
    display:block; text-align:left; width:100%; background:var(--surface-2); border:1px solid var(--border-solid);
    border-radius:8px; padding:10px 12px; margin-top:6px; cursor:pointer; font-size:13px;
  }
  .view-link-card:hover{ border-color:var(--text); }
  .view-section-title{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:18px 0 8px; }

  #toast{
    position:fixed; bottom:24px; right:24px; background:var(--surface-2); border:1px solid var(--amber);
    color:var(--text); padding:12px 18px; border-radius:8px; font-size:13px; z-index:99; display:none;
  }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <div class="login-card">
    <div class="eyebrow">Estúdio</div>
    <h1>Acessar o CRM</h1>
    <div class="field"><label>E-mail</label><input id="login-email" type="email" placeholder="seu@email.com"></div>
    <div class="field"><label>Senha</label><input id="login-pass" type="password" placeholder="••••••••"></div>
    <button class="primary" onclick="doLogin()">Entrar</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebarMobile()"></div>
  <aside id="sidebar">
    <div class="brand">
      <div class="eyebrow">Estúdio</div>
      <h1>CRM</h1>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-footer">
      <div class="footer-row">
        <span id="user-email"></span>
        <button class="theme-toggle ghost" id="theme-toggle-btn" onclick="toggleTheme()" title="Alternar tema">🌙</button>
      </div>
      <button class="ghost" style="width:100%; margin-top:8px;" onclick="doLogout()">Sair</button>
    </div>
  </aside>
  <div style="flex:1; min-width:0;">
    <div id="mobile-topbar">
      <button class="ghost" onclick="openSidebarMobile()">☰ Menu</button>
      <span class="brand-mini">Estúdio · CRM</span>
      <button class="theme-toggle ghost" onclick="toggleTheme()" title="Alternar tema">🌙</button>
    </div>
    <main id="main"></main>
  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal-content"></div>
</div>

<div id="toast"></div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* =========================================================
   CONFIG — preencha com as credenciais do projeto yurifotos-fc313
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyAbwJ9Y4JDJUFF5lZZylJ_T1VK1pDbRY_c",
  authDomain: "yurifotos-fc313.firebaseapp.com",
  projectId: "yurifotos-fc313",
  storageBucket: "yurifotos-fc313.firebasestorage.app",
  messagingSenderId: "594269855745",
  appId: "1:594269855745:web:e20d6736c21655da342000"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();


/* =========================================================
   STATE
   ========================================================= */
const state = {
  leads: [], clientes: [], criancas: [], casamentos: [], eventos: [], pagamentos: [],
  config: {},
  currentPage: "dashboard"
};
const listeners = [];

function toggleTheme(){
  const current = document.documentElement.getAttribute("data-theme") || "dark";
  const next = current === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("crm-theme", next);
  updateThemeIcon();
}
function updateThemeIcon(){
  const isDark = (document.documentElement.getAttribute("data-theme")||"dark") === "dark";
  document.querySelectorAll(".theme-toggle").forEach(b=> b.textContent = isDark ? "🌙" : "☀️");
  const meta = document.getElementById("theme-color-meta");
  if(meta) meta.setAttribute("content", isDark ? "#000000" : "#ffffff");
}
function openSidebarMobile(){
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("sidebar-backdrop").classList.add("open");
}
function closeSidebarMobile(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-backdrop").classList.remove("open");
}
updateThemeIcon();

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(err=> console.error("[sw] erro ao registrar:", err));
  });
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=> t.style.display = "none", 2600);
}

/* =========================================================
   AUTH
   ========================================================= */
function doLogin(){
  const email = document.getElementById("login-email").value.trim();
  const pass = document.getElementById("login-pass").value;
  const errorEl = document.getElementById("login-error");
  const btn = document.querySelector("#login-screen button.primary");
  errorEl.textContent = "";
  btn.disabled = true; btn.textContent = "Entrando...";
  console.log("[login] tentando autenticar:", email);
  auth.signInWithEmailAndPassword(email, pass)
    .then(cred=>{
      console.log("[login] sucesso:", cred.user.email);
    })
    .catch(err=>{
      console.error("[login] erro:", err.code, err.message);
      errorEl.textContent = `Erro: ${err.code || err.message}`;
    })
    .finally(()=>{
      btn.disabled = false; btn.textContent = "Entrar";
    });
}
function doLogout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").classList.add("active");
    document.getElementById("user-email").textContent = user.email;
    startListeners();
    buildNav();
    renderPage("dashboard");
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").classList.remove("active");
    listeners.forEach(unsub=>unsub());
  }
});

/* =========================================================
   FIRESTORE LIVE LISTENERS
   ========================================================= */
function startListeners(){
  ["leads","clientes","criancas","casamentos","eventos","pagamentos"].forEach(col=>{
    const unsub = db.collection(col).onSnapshot(
      snap=>{
        state[col] = snap.docs.map(d=>({ id:d.id, ...d.data() }));
        renderPage(state.currentPage);
      },
      err=>{
        console.error(`[firestore] erro na coleção "${col}":`, err.code, err.message);
        toast(`Erro ao acessar "${col}": ${err.code}`);
      }
    );
    listeners.push(unsub);
  });

  const unsubConfig = db.collection("config").doc("settings").onSnapshot(
    doc=>{
      state.config = doc.exists ? doc.data() : {};
      if(state.currentPage==="configuracoes") renderPage("configuracoes");
    },
    err=>{
      console.error("[firestore] erro em \"config\":", err.code, err.message);
      toast(`Erro ao acessar configurações: ${err.code}`);
    }
  );
  listeners.push(unsubConfig);
}

const QUICK_FIELDS = {
  clientes: [
    {key:"nome", label:"Nome", type:"text", required:true},
    {key:"telefone", label:"Telefone", type:"tel"},
    {key:"cidade", label:"Cidade", type:"text"}
  ],
  criancas: [
    {key:"nome", label:"Nome da criança", type:"text", required:true},
    {key:"dataNascimento", label:"Data de nascimento", type:"date", required:true}
  ],
  casamentos: [
    {key:"nomeCasal", label:"Nome do casal", type:"text", required:true},
    {key:"dataCasamento", label:"Data do casamento", type:"date", required:true}
  ]
};

/* =========================================================
   COLLECTION SCHEMAS (driven UI)
   ========================================================= */
const SCHEMAS = {
  leads: {
    label: "Leads", singular:"Lead",
    fields: [
      {key:"nome", label:"Nome", type:"text", required:true},
      {key:"telefone", label:"Telefone", type:"tel"},
      {key:"origem", label:"Como chegou até você", type:"select", options:["instagram","indicacao","google","igreja","outro"]},
      {key:"interesseTipo", label:"Interesse em", type:"select", options:["aniversario","batizado","casamento_civil","casamento_religioso","ensaio","outro"]},
      {key:"status", label:"Status", type:"select", options:["novo","contatado","negociando","convertido","perdido"]},
      {key:"motivoPerda", label:"Motivo da perda (se perdido)", type:"select", options:["outro_fotografo","achou_caro","cancelou_festa","nao_respondeu","outro"]},
      {key:"observacoes", label:"Observações", type:"textarea"}
    ],
    columns: [
      {key:"nome", label:"Nome"},
      {key:"telefone", label:"Telefone"},
      {key:"interesseTipo", label:"Interesse", format:v=>v?capitalize(v.replace("_"," ")):"—"},
      {key:"status", label:"Status", format:v=>{
        const s = v||"novo";
        const sym = {novo:"○", contatado:"◐", negociando:"◑", convertido:"✓", perdido:"✕"};
        const lbl = {novo:"Novo", contatado:"Contatado", negociando:"Negociando", convertido:"Convertido", perdido:"Perdido"};
        return `<span class="badge lead-${s}">${sym[s]||""} ${lbl[s]||capitalize(s)}</span>`;
      }}
    ]
  },
  clientes: {
    label: "Clientes", singular:"Cliente",
    fields: [
      {key:"nome", label:"Nome", type:"text", required:true},
      {key:"nomeConjuge", label:"Cônjuge / parceiro(a) (se for casamento)", type:"text"},
      {key:"telefone", label:"Telefone", type:"tel"},
      {key:"cidade", label:"Cidade", type:"text"},
      {key:"origem", label:"Como encontrou você", type:"select", options:["instagram","indicacao","google","igreja","outro"]},
      {key:"indicadoPor", label:"Indicado por (nome)", type:"text"},
      {key:"observacoes", label:"Observações", type:"textarea"}
    ],
    columns: [
      {key:"nome", label:"Nome"},
      {key:"telefone", label:"Telefone"},
      {key:"cidade", label:"Cidade"},
      {key:"origem", label:"Origem", format:v=>v?capitalize(v):"—"}
    ]
  },
  criancas: {
    label: "Aniversariantes", singular:"Criança",
    fields: [
      {key:"nome", label:"Nome", type:"text", required:true},

/* =========================================================
   HELPERS
   ========================================================= */
function capitalize(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : s; }
const STATUS_LABELS = {
  lead:"Lead", orcamento:"Orçamento enviado", negociacao:"Negociação",
  fechado:"Fechado", realizado:"Realizado", entregue:"Entregue", perdido:"Perdido"
};
function statusLabel(s){ return STATUS_LABELS[s] || capitalize(s); }
function money(v){ return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function formatDate(v){
  if(!v) return "—";
  const [y,m,d] = v.split("-");
  return d ? `${d}/${m}/${y}` : v;
}
function nomeRef(col, id){
  const item = state[col]?.find(i=>i.id===id);
  if(!item) return "—";
  if(col==="clientes" && item.nomeConjuge) return `${item.nome} & ${item.nomeConjuge}`;
  if(col==="casamentos") return item.conjuge ? `${item.nomeCasal} & ${item.conjuge}` : item.nomeCasal;
  return item.nome;
}
function labelEvento(id){
  const ev = state.eventos.find(e=>e.id===id);
  if(!ev) return "—";
  return `${capitalize((ev.tipo||"").replace("_"," "))} · ${formatDate(ev.data)} · ${nomeRef("clientes",ev.clienteId)}`;
}
function idadeAtual(dataNasc){
  if(!dataNasc) return "—";
  const hoje = new Date(); const nasc = new Date(dataNasc+"T00:00:00");
  let idade = hoje.getFullYear() - nasc.getFullYear();
  const aindaNaoFezAniversario = (hoje.getMonth()<nasc.getMonth()) || (hoje.getMonth()===nasc.getMonth() && hoje.getDate()<nasc.getDate());
  if(aindaNaoFezAniversario) idade--;
  return idade;
}
function idadeNaData(dataNasc, dataRef){
  if(!dataNasc || !dataRef) return "—";
  const ref = new Date(dataRef+"T00:00:00"); const nasc = new Date(dataNasc+"T00:00:00");
  let idade = ref.getFullYear() - nasc.getFullYear();
  const aindaNao = (ref.getMonth()<nasc.getMonth()) || (ref.getMonth()===nasc.getMonth() && ref.getDate()<nasc.getDate());
  if(aindaNao) idade--;
  return idade;
}
function tempoDesde(dataStr){
  if(!dataStr) return "—";
  const inicio = new Date(dataStr+"T00:00:00");
  const hoje = new Date();
  let anos = hoje.getFullYear() - inicio.getFullYear();
  let meses = hoje.getMonth() - inicio.getMonth();
  if(hoje.getDate() < inicio.getDate()) meses--;
  if(meses < 0){ anos--; meses += 12; }
  if(anos<=0 && meses<=0) return "menos de 1 mês";
  const partes = [];
  if(anos>0) partes.push(`${anos} ano${anos>1?"s":""}`);
  if(meses>0) partes.push(`${meses} ${meses>1?"meses":"mês"}`);
  return partes.join(" e ");
}
function diasParaAniversario(dataNasc){
  if(!dataNasc) return "—";
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const nasc = new Date(dataNasc+"T00:00:00");
  let prox = new Date(hoje.getFullYear(), nasc.getMonth(), nasc.getDate());
  if(prox < hoje) prox = new Date(hoje.getFullYear()+1, nasc.getMonth(), nasc.getDate());
  return Math.round((prox - hoje) / 86400000);
}
function isMesmoMes(dataStr){
  if(!dataStr) return false;
  const hoje = new Date(); const d = new Date(dataStr+"T00:00:00");
  return hoje.getFullYear()===d.getFullYear() && hoje.getMonth()===d.getMonth();
}
function totalPago(eventoId){
  return state.pagamentos.filter(p=>p.eventoId===eventoId).reduce((s,p)=>s+(Number(p.valor)||0),0);
}

let eventosFiltroTipo = "";
let eventosFiltroTag = "";
let expandedYears = null; // inicializado com o ano mais recente aberto

function renderEventosPage(main){
  const schema = SCHEMAS.eventos;
  const todosOsTipos = ["aniversario","batizado","casamento_civil","casamento_religioso","ensaio","outro"];

  main.innerHTML = `

          oninput="eventosFiltroTag=this.value; renderEventosList();" style="width:150px;">
        <select id="filtro-tipo-evento" onchange="eventosFiltroTipo=this.value; renderEventosList();" style="width:auto;">
          <option value="">Todos os tipos</option>
          ${todosOsTipos.map(t=>`<option value="${t}" ${eventosFiltroTipo===t?"selected":""}>${capitalize(t.replace("_"," "))}</option>`).join("")}
        </select>
        <button class="primary" onclick="openForm('eventos')">+ Novo Evento</button>
      </div>
    </div>
    <div id="eventos-list-container"></div>
  `;
  renderEventosList();
}

function renderEventosList(){
  const container = document.getElementById("eventos-list-container");
  if(!container) return;
  const schema = SCHEMAS.eventos;

  let itens = [...state.eventos];
  if(eventosFiltroTipo) itens = itens.filter(e=>e.tipo===eventosFiltroTipo);
  if(eventosFiltroTag.trim()){
    const termo = eventosFiltroTag.trim().toLowerCase();
    itens = itens.filter(e=>(e.tags||[]).some(t=>t.toLowerCase().includes(termo)));
  }

  // agrupa por ano (a partir da data do evento; sem data vai pra "Sem data")
  const porAno = {};
  itens.forEach(ev=>{
    const ano = ev.data ? ev.data.slice(0,4) : "Sem data";
    if(!porAno[ano]) porAno[ano] = [];
    porAno[ano].push(ev);
  });
  const anos = Object.keys(porAno).sort((a,b)=> b.localeCompare(a));

  if(expandedYears === null){
    expandedYears = new Set(anos.length ? [anos[0]] : []);
  }

  container.innerHTML = anos.length ? anos.map(ano=>renderAnoStack(ano, porAno[ano], schema)).join("") : `
    <div class="card"><div class="empty-state"><div class="serif">Nada encontrado</div>Tente outro filtro ou cadastre um novo evento.</div></div>
  `;
}

function renderAnoStack(ano, eventosDoAno, schema){
  const isOpen = expandedYears.has(ano);
  const ordenados = [...eventosDoAno].sort((a,b)=> (b.data||"").localeCompare(a.data||""));
  const totalValor = eventosDoAno.reduce((s,e)=> s + (Number(e.valorContratado)||0), 0);

  return `
    <div class="card" style="padding:0; margin-bottom:14px; overflow:hidden;">
      <div style="display:flex; align-items:center; justify-content:space-between; padding:14px 18px; cursor:pointer;" onclick="toggleAno('${ano}')">
        <div style="display:flex; align-items:center; gap:10px;">
          <span style="font-family:'Fraunces',serif; font-size:18px;">${isOpen?'▾':'▸'} ${ano}</span>
          <span style="font-size:12px; color:var(--muted);">${eventosDoAno.length} evento${eventosDoAno.length===1?'':'s'} · ${money(totalValor)}</span>
        </div>
        <span style="font-size:12px; color:var(--muted-2);">${isOpen?'recolher':'expandir'}</span>
      </div>
      ${isOpen ? `
        <div style="overflow-x:auto; border-top:1px solid var(--border-solid);">
          <table>
            <thead><tr>${schema.columns.map(c=>`<th>${c.label}</th>`).join("")}<th></th></tr></thead>
            <tbody>
              ${ordenados.map(item=>`
                <tr>
                  ${schema.columns.map(c=>`<td>${c.format ? c.format(item[c.key],item) : (item[c.key] ?? "—")}</td>`).join("")}
                  <td class="row-actions">
                    <button class="sm" onclick="openView('eventos','${item.id}')">Ver</button>
                    <button class="sm" onclick="openForm('eventos','${item.id}')">Editar</button>
                    <button class="sm danger" onclick="deleteDoc('eventos','${item.id}')">Excluir</button>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      ` : ""}
    </div>
  `;
}

function toggleAno(ano){
  if(expandedYears.has(ano)) expandedYears.delete(ano);
  else expandedYears.add(ano);
  renderEventosList();
}

function renderPage(page){

  if(page==="dashboard") return renderDashboard(main);
  if(page==="eventos") return renderEventosPage(main);
  if(page==="relatorios") return renderRelatorios(main);
  if(page==="configuracoes") return renderConfiguracoes(main);

function proximaDataAniversario(dataNasc){
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const nasc = new Date(dataNasc+"T00:00:00");
  let prox = new Date(hoje.getFullYear(), nasc.getMonth(), nasc.getDate());
  if(prox < hoje) prox = new Date(hoje.getFullYear()+1, nasc.getMonth(), nasc.getDate());
  return prox;
}
function montarMensagemAniversario(criancaId){
  const c = state.criancas.find(x=>x.id===criancaId);
  if(!c) return null;
  const template = state.config.mensagemAniversario || "";
  if(!template) return { erro: "Cadastre a mensagem em Configurações primeiro." };
  const responsavelId = c.clientePaiId || c.clienteMaeId;
  const cliente = responsavelId ? state.clientes.find(x=>x.id===responsavelId) : null;
  const idade = idadeAtual(c.dataNascimento) + 1;
  const dataFormatada = proximaDataAniversario(c.dataNascimento).toLocaleDateString('pt-BR');
  const texto = template
    .replaceAll("{nome}", c.nome||"")
    .replaceAll("{idade}", String(idade))
    .replaceAll("{data}", dataFormatada)
    .replaceAll("{responsavel}", cliente ? cliente.nome : "");
  return { texto, cliente };
}
function enviarMensagemAniversario(criancaId){
  const resultado = montarMensagemAniversario(criancaId);
  if(!resultado) return;
  if(resultado.erro){ toast(resultado.erro); return; }

}
function montarMensagemCasamento(casamentoId){

/* ---------- RELATÓRIOS ---------- */
function renderRelatorios(main){
  const todosOsTipos = ["aniversario","batizado","casamento_civil","casamento_religioso","ensaio","outro"];
  const porTipo = todosOsTipos.map(t=>{
    const todosDoTipo = state.eventos.filter(e=>e.tipo===t);
    const comValor = todosDoTipo.filter(e=>Number(e.valorContratado)>0);
    const soma = comValor.reduce((s,e)=>s+Number(e.valorContratado),0);
    return { tipo:t, total: todosDoTipo.length, comValor: comValor.length, media: comValor.length ? soma/comValor.length : 0, soma };
  }).filter(x=>x.total>0);

  const origens = ["instagram","indicacao","google","igreja","outro"];
  const totalClientes = state.clientes.length;
  const semOrigem = state.clientes.filter(c=>!c.origem).length;
  const porOrigem = origens.map(o=>{
    const n = state.clientes.filter(c=>c.origem===o).length;
    return { origem:o, n, pct: totalClientes ? Math.round(n/totalClientes*100) : 0 };
  }).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);

  const totalContratado = state.eventos.reduce((s,e)=>s+(Number(e.valorContratado)||0),0);
  const totalRecebido = state.pagamentos.reduce((s,p)=>s+(Number(p.valor)||0),0);

  // ---------- Faturamento por mês ----------
  const mesesMap = {}; // "2025-03" -> {eventos, contratado, recebido}
  state.eventos.forEach(e=>{
    if(!e.data) return;
    const chave = e.data.slice(0,7);
    if(!mesesMap[chave]) mesesMap[chave] = {eventos:0, contratado:0, recebido:0};
    mesesMap[chave].eventos++;
    mesesMap[chave].contratado += Number(e.valorContratado)||0;
  });
  state.pagamentos.forEach(p=>{
    if(!p.data) return;
    const chave = p.data.slice(0,7);
    if(!mesesMap[chave]) mesesMap[chave] = {eventos:0, contratado:0, recebido:0};
    mesesMap[chave].recebido += Number(p.valor)||0;
  });
  const chavesMeses = Object.keys(mesesMap).sort().reverse();
  const nomesMes = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

  // ---------- Taxa de retorno de clientes ----------
  const eventosPorCliente = {};
  state.eventos.forEach(e=>{ if(e.clienteId) (eventosPorCliente[e.clienteId] = eventosPorCliente[e.clienteId]||[]).push(e); });
  const clientesComEvento = Object.keys(eventosPorCliente);
  const clientesRecorrentes = clientesComEvento.filter(id=>eventosPorCliente[id].length>1);
  const taxaRetorno = clientesComEvento.length ? (clientesRecorrentes.length/clientesComEvento.length*100) : 0;
  const mediaEventosPorCliente = clientesComEvento.length ? (state.eventos.filter(e=>e.clienteId).length/clientesComEvento.length) : 0;
  const clientesVip = clientesRecorrentes
    .map(id=>({
      id, nome:nomeRef("clientes",id), n:eventosPorCliente[id].length,
      valorTotal: eventosPorCliente[id].reduce((s,e)=>s+(Number(e.valorContratado)||0),0)
    }))
    .sort((a,b)=>b.valorTotal-a.valorTotal).slice(0,10);

  // padrões de recorrência (tipo A -> tipo B em sequência cronológica)
  const padroes = {};
  clientesRecorrentes.forEach(id=>{
    const seq = [...eventosPorCliente[id]].sort((a,b)=>(a.data||"").localeCompare(b.data||""));

      const chave = `${capitalize((seq[i].tipo||"").replace("_"," "))} → ${capitalize((seq[i+1].tipo||"").replace("_"," "))}`;
      padroes[chave] = (padroes[chave]||0)+1;
    }
  });
  const padroesOrdenados = Object.entries(padroes).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // ---------- Funil de vendas ----------
  const funilEtapas = [
    {key:"orcamento", label:"Orçamento enviado"},
    {key:"negociacao", label:"Negociação"},
    {key:"fechado", label:"Fechado", extra:["realizado","entregue"]},
    {key:"perdido", label:"Perdido (eventos)"}
  ];
  const funilContagem = funilEtapas.map(et=>{
    const statusesContados = [et.key, ...(et.extra||[])];
    return { ...et, n: state.eventos.filter(e=>statusesContados.includes(e.status||"orcamento")).length };
  });
  const totalLeads = state.leads.length;
  const leadsPerdidos = state.leads.filter(l=>l.status==="perdido").length;
  const leadsConvertidos = state.leads.filter(l=>l.status==="convertido").length;
  const totalFunil = state.eventos.length;
  const totalFechados = funilContagem.find(f=>f.key==="fechado").n;
  const totalPerdidos = funilContagem.find(f=>f.key==="perdido").n + leadsPerdidos;
  const taxaConversao = totalLeads>0 ? (totalFechados/totalLeads*100) : 0;

  const motivosPerda = ["outro_fotografo","achou_caro","cancelou_festa","nao_respondeu","outro"];
  const motivosLabel = {outro_fotografo:"Fechou com outro fotógrafo", achou_caro:"Achou caro", cancelou_festa:"Cancelou a festa", nao_respondeu:"Não respondeu", outro:"Outro motivo"};
  const porMotivo = motivosPerda.map(m=>({
    motivo:m,
    n: state.eventos.filter(e=>e.status==="perdido" && e.motivoPerda===m).length
      + state.leads.filter(l=>l.status==="perdido" && l.motivoPerda===m).length
  })).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  const perdidosSemMotivo = state.eventos.filter(e=>e.status==="perdido" && !e.motivoPerda).length
    + state.leads.filter(l=>l.status==="perdido" && !l.motivoPerda).length;

  main.innerHTML = `
    <div class="page-header"><div><div class="eyebrow">Visão de negócio</div><h2>Relatórios</h2></div></div>

    <div class="grid grid-4">
      <div class="card stat-card"><div class="label">Total de eventos</div><div class="value">${state.eventos.length}</div></div>
      <div class="card stat-card"><div class="label">Valor contratado (total)</div><div class="value" style="font-size:19px">${money(totalContratado)}</div></div>
      <div class="card stat-card"><div class="label">Total recebido</div><div class="value" style="font-size:19px">${money(totalRecebido)}</div></div>
      <div class="card stat-card"><div class="label">Clientes cadastrados</div><div class="value">${totalClientes}</div></div>
    </div>

    <div class="section-title">Ticket médio por tipo de evento</div>
    <div class="card" style="padding:0;">
      ${porTipo.length ? `<table><thead><tr><th>Tipo</th><th>Eventos</th><th>Com valor informado</th><th>Ticket médio</th></tr></thead><tbody>
        ${porTipo.map(x=>`<tr><td>${capitalize(x.tipo.replace("_"," "))}</td><td>${x.total}</td><td>${x.comValor}</td><td>${money(x.media)}</td></tr>`).join("")}
      </tbody></table>` : `<div class="empty-state">Sem eventos suficientes ainda.</div>`}
    </div>

    <div class="section-title">Ranking de origem dos clientes</div>
    <div class="card" style="padding:0;">
      ${porOrigem.length || semOrigem ? `<table><thead><tr><th>#</th><th>Origem</th><th>Clientes</th><th>%</th></tr></thead><tbody>
        ${porOrigem.map((x,i)=>`<tr><td>${i+1}</td><td>${capitalize(x.origem)}</td><td>${x.n}</td><td>${x.pct}%</td></tr>`).join("")}
        ${semOrigem ? `<tr><td>—</td><td>Não informado</td><td>${semOrigem}</td><td>${totalClientes?Math.round(semOrigem/totalClientes*100):0}%</td></tr>` : ""}
      </tbody></table>` : `<div class="empty-state">Cadastre a origem dos clientes para ver o ranking.</div>`}
    </div>

    <div class="section-title">Faturamento por mês</div>
    <div class="card" style="padding:0; overflow-x:auto;">
      ${chavesMeses.length ? `<table><thead><tr><th>Mês</th><th>Eventos</th><th>Contratado</th><th>Recebido</th><th>Ticket médio</th><th>Vs. ano anterior</th></tr></thead><tbody>
        ${chavesMeses.map(chave=>{
          const [ano,mes] = chave.split("-");
          const m = mesesMap[chave];
          const ticketMedio = m.eventos ? m.contratado/m.eventos : 0;
          const chaveAnoAnterior = `${Number(ano)-1}-${mes}`;
          const anterior = mesesMap[chaveAnoAnterior];
          let comparacao = "—";
          if(anterior && anterior.contratado>0){
            const variacao = ((m.contratado-anterior.contratado)/anterior.contratado)*100;
            comparacao = `${variacao>=0?"+":""}${variacao.toFixed(0)}%`;
          }
          return `<tr><td>${nomesMes[Number(mes)-1]}/${ano}</td><td>${m.eventos}</td><td>${money(m.contratado)}</td><td>${money(m.recebido)}</td><td>${money(ticketMedio)}</td><td>${comparacao}</td></tr>`;
        }).join("")}
      </tbody></table>` : `<div class="empty-state">Sem dados suficientes ainda.</div>`}
    </div>

    <div class="section-title">Taxa de retorno de clientes</div>
    <div class="grid grid-4">
      <div class="card stat-card"><div class="label">Clientes com evento</div><div class="value">${clientesComEvento.length}</div></div>
      <div class="card stat-card"><div class="label">Clientes recorrentes</div><div class="value">${clientesRecorrentes.length}</div></div>
      <div class="card stat-card"><div class="label">Taxa de retorno</div><div class="value">${taxaRetorno.toFixed(1)}%</div></div>
      <div class="card stat-card"><div class="label">Eventos por cliente (média)</div><div class="value">${mediaEventosPorCliente.toFixed(1)}</div></div>
    </div>

    <div class="section-title">🌟 Clientes VIP</div>
    <div class="card" style="padding:0;">
      ${clientesVip.length ? `<table><thead><tr><th>#</th><th>Cliente</th><th>Eventos</th><th>Valor total gerado</th></tr></thead><tbody>
        ${clientesVip.map((x,i)=>`<tr><td>${i+1}</td><td><a href="#" onclick="openView('clientes','${x.id}');return false;">${x.nome}</a></td><td>${x.n}</td><td>${money(x.valorTotal)}</td></tr>`).join("")}
      </tbody></table>` : `<div class="empty-state">Ainda não há clientes recorrentes.</div>`}
    </div>
    ${padroesOrdenados.length ? `
      <div class="section-title">Padrões mais comuns na recorrência</div>
      <div class="card" style="padding:0;">
        <table><thead><tr><th>Sequência</th><th>Ocorrências</th></tr></thead><tbody>
          ${padroesOrdenados.map(([chave,n])=>`<tr><td>${chave}</td><td>${n}</td></tr>`).join("")}
        </tbody></table>
      </div>
    ` : ""}

    <div class="section-title">Funil de vendas</div>
    <div class="card" style="padding:0;">
      <table><thead><tr><th>Etapa</th><th>Quantidade</th></tr></thead><tbody>
        <tr><td>Leads recebidos</td><td>${totalLeads}</td></tr>
        ${funilContagem.map(f=>`<tr><td>${f.label}</td><td>${f.n}</td></tr>`).join("")}
        <tr><td>Leads convertidos em cliente</td><td>${leadsConvertidos}</td></tr>
      </tbody></table>
    </div>
    <div class="grid grid-3" style="margin-top:14px;">
      <div class="card stat-card"><div class="label">Taxa de conversão</div><div class="value">${taxaConversao.toFixed(1)}%</div><div class="sub">eventos fechados ÷ leads recebidos</div></div>
      <div class="card stat-card"><div class="label">Fechados</div><div class="value">${totalFechados}</div></div>
      <div class="card stat-card"><div class="label">Perdidos</div><div class="value">${totalPerdidos}</div></div>
    </div>
    <div style="font-size:12px; color:var(--muted-2); margin:10px 2px 0;">
      💡 Como o sistema não guarda histórico de mudança de etapa, estes números são uma fotografia do status atual de cada evento — não um funil cumulativo ao longo do tempo.
    </div>
    ${(porMotivo.length || perdidosSemMotivo) ? `
      <div class="section-title">Motivos de perda</div>
      <div class="card" style="padding:0;">
        <table><thead><tr><th>Motivo</th><th>Quantidade</th></tr></thead><tbody>
          ${porMotivo.map(x=>`<tr><td>${motivosLabel[x.motivo]}</td><td>${x.n}</td></tr>`).join("")}
          ${perdidosSemMotivo ? `<tr><td>Sem motivo informado</td><td>${perdidosSemMotivo}</td></tr>` : ""}
        </tbody></table>
      </div>
    ` : ""}
  `;
}

const collectionSearch = {};
function renderCollectionPage(main, col){
  const schema = SCHEMAS[col];
  main.innerHTML = `
    <div class="page-header">
      <div><div class="eyebrow">Cadastro</div><h2>${schema.label}</h2></div>
      <div class="page-actions">
        <input type="text" id="busca-${col}" placeholder="Buscar..." value="${collectionSearch[col]||""}"
          oninput="collectionSearch['${col}']=this.value; renderCollectionList('${col}');" style="width:160px;">
        <button class="primary" onclick="openForm('${col}')">+ Novo ${schema.singular}</button>
      </div>
    </div>
    <div id="collection-list-${col}"></div>
    ${col==="pagamentos" ? renderFinanceiroExtras() : ""}
  `;
  renderCollectionList(col);
}

function renderCollectionList(col){
  const container = document.getElementById(`collection-list-${col}`);
  if(!container) return;
  const schema = SCHEMAS[col];
  const termo = (collectionSearch[col]||"").trim().toLowerCase();

  let items = [...state[col]];
  if(termo){
    items = items.filter(item => Object.values(item).some(v=>{
      if(v==null) return false;
      if(Array.isArray(v)) return v.join(" ").toLowerCase().includes(termo);
      return String(v).toLowerCase().includes(termo);
    }));
  }
  items.sort((a,b)=>{
    if(a.data && b.data) return b.data.localeCompare(a.data);
    return (a.nome||a.nomeCasal||"").localeCompare(b.nome||b.nomeCasal||"", "pt-BR");
  });

  container.innerHTML = `
    <div class="card" style="padding:0; overflow-x:auto;">
      ${items.length ? `
      <table>
        <thead><tr>${schema.columns.map(c=>`<th>${c.label}</th>`).join("")}<th></th></tr></thead>
        <tbody>
          ${items.map(item=>`
            <tr>
              ${schema.columns.map(c=>`<td>${c.format ? c.format(item[c.key],item) : (item[c.key] ?? "—")}</td>`).join("")}
              <td class="row-actions">
                ${(col==="leads" && !item.clienteId) ? `<button class="sm" onclick="converterLeadEmCliente('${item.id}')">Converter</button>` : ""}
                <button class="sm" onclick="openView('${col}','${item.id}')">Ver</button>
                <button class="sm" onclick="openForm('${col}','${item.id}')">Editar</button>
                <button class="sm danger" onclick="deleteDoc('${col}','${item.id}')">Excluir</button>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>` : `<div class="empty-state"><div class="serif">Nada encontrado</div>${termo ? "Tente outro termo de busca." : `Cadastre o primeiro ${schema.singular.toLowerCase()} para começar.`}</div>`}
    </div>
  `;
}

function renderEventosExtras(){
  // tag search shortcut
  const allTags = [...new Set(state.eventos.flatMap(e=>e.tags||[]))];
  if(!allTags.length) return "";
  return `

    <div class="card">

function filterByTag(tag){
  const matches = state.eventos.filter(e=>(e.tags||[]).includes(tag));
  alert(matches.map(e=>`${capitalize((e.tipo||"").replace("_"," "))} · ${formatDate(e.data)} · ${nomeRef("clientes",e.clienteId)}`).join("\n") || "Nenhum evento com essa tag.");
}

function renderFinanceiroExtras(){
  const porMes = {};
  state.pagamentos.forEach(p=>{
    if(!p.data) return;
    const chave = p.data.slice(0,7);
    porMes[chave] = (porMes[chave]||0) + (Number(p.valor)||0);
  });
  const meses = Object.keys(porMes).sort().reverse().slice(0,12);
  return `

}

   FORM MODAL (driven by schema)
   ========================================================= */
let formState = {};
/* =========================================================
   VISUALIZAÇÃO (somente leitura)
   ========================================================= */
function viewRow(label, valueHtml){
  return `<div class="view-row"><span class="view-label">${label}</span><span class="view-value">${valueHtml}</span></div>`;
}
function whatsappLink(telefone){
  if(!telefone) return null;
  let digits = telefone.replace(/\D/g,"");
  if(!digits) return null;
  if(!digits.startsWith("55")) digits = "55"+digits;
  return `https://wa.me/${digits}`;
}
function viewActions(col, id, extraHtml){
  return `<div class="modal-actions">
    ${extraHtml||""}
    <button class="danger" onclick="excluirEFechar('${col}','${id}')">Excluir</button>
    <button class="ghost" onclick="closeModal()">Fechar</button>
    <button class="primary" onclick="openForm('${col}','${id}')">Editar</button>
  </div>`;
}
async function excluirEFechar(col, id){
  if(!confirm("Tem certeza que deseja excluir? Essa ação não pode ser desfeita.")) return;
  try{
    await db.collection(col).doc(id).delete();
    toast("Excluído.");
    closeModal();
  }catch(err){
    console.error(err);
    toast("Erro ao excluir. Veja o console.");
  }
}
function copiarResumoEvento(eventoId){
  const ev = state.eventos.find(e=>e.id===eventoId);
  if(!ev) return;
  const cliente = state.clientes.find(c=>c.id===ev.clienteId);
  const nomeCliente = cliente ? (cliente.nome + (cliente.nomeConjuge ? " & "+cliente.nomeConjuge : "")) : "—";
  const saldo = (Number(ev.valorContratado)||0) - totalPago(ev.id);
  const linhas = [
    `${ev.tipo==="outro" && ev.outroDescricao ? ev.outroDescricao : capitalize((ev.tipo||"").replace("_"," "))} — ${nomeCliente}`,
    `Data: ${formatDate(ev.data)}${ev.horario ? " às "+ev.horario : ""}`,
    ev.valorContratado ? `Valor: ${money(ev.valorContratado)}` : null,
    ev.valorContratado ? (saldo>0 ? `Saldo pendente: ${money(saldo)}` : `Status: pago integralmente`) : null,
    ev.dataEntregaPrevista ? `Entrega prevista: ${formatDate(ev.dataEntregaPrevista)}` : null,
    cliente?.telefone ? `Contato: ${cliente.telefone}` : null
  ].filter(Boolean);
  const texto = linhas.join("\n");
  navigator.clipboard.writeText(texto)
    .then(()=> toast("Resumo copiado!"))
    .catch(()=> toast("Não foi possível copiar. Copie manualmente: "+texto));
}

function openView(col, id){
  const item = state[col]?.find(i=>i.id===id);
  if(!item) return;
  const renderers = { eventos: renderViewEvento, clientes: renderViewCliente, criancas: renderViewCrianca, casamentos: renderViewCasamento, leads: renderViewLead };
  const html = (renderers[col] || renderViewGeneric)(item, col);
  document.getElementById("modal-content").innerHTML = html;
  document.getElementById("modal-backdrop").classList.add("active");
}

function renderViewGeneric(item, col){
  const schema = SCHEMAS[col];
  return `<h3>${schema.singular}</h3>
    ${schema.fields.map(f=>{
      let val = item[f.key];
      if(f.type==="ref") val = val ? nomeRef(f.ref, val) : "—";
      else if(Array.isArray(val)) val = val.join(", ") || "—";
      else val = val || "—";
      return viewRow(f.label, val);
    }).join("")}
    ${viewActions(col, item.id)}`;
}

function renderViewEvento(ev){
  const saldo = (Number(ev.valorContratado)||0) - totalPago(ev.id);
  const symbols = {orcamento:'○', negociacao:'◐', fechado:'●', realizado:'●', entregue:'✓', perdido:'✕'};
  const s = ev.status || 'orcamento';
  return `<h3>${ev.tipo==="outro" && ev.outroDescricao ? ev.outroDescricao : capitalize((ev.tipo||"").replace("_"," "))} · ${formatDate(ev.data)}</h3>
    ${viewRow("Cliente", `<a href="#" onclick="openView('clientes','${ev.clienteId}');return false;">${nomeRef("clientes",ev.clienteId)}</a>`)}

async function converterLeadEmCliente(leadId){
  const lead = state.leads.find(l=>l.id===leadId);
  if(!lead) return;
  try{
    const novoCliente = await db.collection("clientes").add({
      nome: lead.nome || "",
      telefone: lead.telefone || "",
      origem: lead.origem || "",
      observacoes: lead.observacoes || "",
      criadoEm: new Date().toISOString()
    });
    await db.collection("leads").doc(leadId).update({ status:"convertido", clienteId: novoCliente.id });
    toast("Lead convertido em cliente!");
    openView("clientes", novoCliente.id);
  }catch(err){
    console.error(err);
    toast("Erro ao converter o lead. Veja o console.");
  }
}

async function vincularCriancaExistente(clienteId){
  const select = document.getElementById(`select-vincular-crianca-${clienteId}`);
  const criancaId = select ? select.value : "";
  if(!criancaId){ toast("Selecione uma criança primeiro."); return; }
  const crianca = state.criancas.find(c=>c.id===criancaId);
  if(!crianca) return;
  const campo = !crianca.clientePaiId ? "clientePaiId" : "clienteMaeId";
  try{
    await db.collection("criancas").doc(criancaId).update({ [campo]: clienteId });
    toast("Criança vinculada.");
    openView("clientes", clienteId);
  }catch(err){
    console.error(err);
    toast("Erro ao vincular. Veja o console.");
  }
}
async function desvincularCrianca(criancaId, clienteId){
  if(!confirm("Desvincular essa criança deste cliente?")) return;
  const crianca = state.criancas.find(c=>c.id===criancaId);
  if(!crianca) return;
  const updates = {};
  if(crianca.clientePaiId===clienteId) updates.clientePaiId = "";
  if(crianca.clienteMaeId===clienteId) updates.clienteMaeId = "";
  try{
    await db.collection("criancas").doc(criancaId).update(updates);
    toast("Criança desvinculada.");
    openView("clientes", clienteId);
  }catch(err){
    console.error(err);
    toast("Erro ao desvincular. Veja o console.");
  }
}

function openForm(col, id){
  const schema = SCHEMAS[col];
  const existing = id ? state[col].find(i=>i.id===id) : null;
  formState = existing ? { ...existing } : {};
  formState._col = col; formState._id = id || null;
  if(!existing && col==="eventos") formState.status = "orcamento"; // deixa explícito em vez de só "parecer" orçamento na tela

  const showMarkPaid = col==="eventos" && existing && (Number(existing.valorContratado)||0) > totalPago(id);

  document.getElementById("modal-content").innerHTML = `
    <h3>${existing ? "Editar" : "Novo"} ${schema.singular}</h3>
    <div id="form-fields">${camposVisiveis(schema).map(f=>renderField(f, formState[f.key])).join("")}</div>
    ${showMarkPaid ? `
      <div class="card" style="margin-top:4px; padding:12px 14px;">
        <div style="font-size:12px; color:var(--muted); margin-bottom:8px;">
          Saldo pendente neste evento: ${money((Number(existing.valorContratado)||0) - totalPago(id))}. Cadastrando evento antigo? Marque como já recebido em vez de deixar pendente no financeiro.
        </div>
        <button class="sm" onclick="marcarComoRecebido('${id}')">Marcar valor total como já recebido</button>
      </div>
    ` : ""}
    <div class="modal-actions">
      <button class="ghost" onclick="closeModal()">Cancelar</button>
      <button class="primary" onclick="saveDoc()">Salvar</button>
    </div>
  `;
  document.getElementById("modal-backdrop").classList.add("active");
}
function camposVisiveis(schema){
  return schema.fields.filter(f=> !f.visibleIf || f.visibleIf(formState));
}
function refreshFormFields(){
  const schema = SCHEMAS[formState._col];
  document.getElementById("form-fields").innerHTML = camposVisiveis(schema).map(f=>renderField(f, formState[f.key])).join("");
}
async function marcarComoRecebido(eventoId){
  const ev = state.eventos.find(e=>e.id===eventoId);
  if(!ev) return;
  const saldo = (Number(ev.valorContratado)||0) - totalPago(eventoId);
  if(saldo<=0) return;
  try{
    await db.collection("pagamentos").add({
      eventoId, clienteId: ev.clienteId||"", valor: saldo,
      data: ev.data || new Date().toISOString().slice(0,10),
      forma: "outro", tipo: "saldo",
      criadoEm: new Date().toISOString()
    });
    toast("Evento marcado como totalmente recebido.");
    closeModal();
  }catch(err){
    console.error(err);
    toast("Erro ao registrar o recebimento.");
  }
}

function closeModal(){ document.getElementById("modal-backdrop").classList.remove("active"); formState = {}; }

function renderField(f, value){
  const id = `field-${f.key}`;
  if(f.type==="textarea"){
    return `<div class="field"><label>${f.label}</label><textarea id="${id}" oninput="formState['${f.key}']=this.value">${value||""}</textarea></div>`;
  }
  if(f.type==="select"){
    return `<div class="field"><label>${f.label}</label>
      <select id="${id}" onchange="formState['${f.key}']=this.value;${f.triggersRefresh?' refreshFormFields();':''}" style="width:100%">
        <option value="">—</option>
        ${f.options.map(o=>`<option value="${o}" ${value===o?"selected":""}>${f.key==="status" ? statusLabel(o) : capitalize(o.replace("_"," "))}</option>`).join("")}
      </select></div>`;
  }
  if(f.type==="ref"){
    const opts = [...(state[f.ref] || [])].sort((a,b)=>{
      if(f.key==="criancaId" && formState.clienteId){
        const aLinked = (a.clientePaiId===formState.clienteId || a.clienteMaeId===formState.clienteId) ? 0 : 1;
        const bLinked = (b.clientePaiId===formState.clienteId || b.clienteMaeId===formState.clienteId) ? 0 : 1;
        if(aLinked !== bLinked) return aLinked - bLinked;
      }
      return (a.nome||a.nomeCasal||"").localeCompare(b.nome||b.nomeCasal||"", "pt-BR");
    });
    const isNew = value === "__new__";
    return `<div class="field"><label>${f.label}</label>
      <select id="${id}" onchange="onRefChange('${f.key}','${f.ref}',this.value)" style="width:100%">
        <option value="">—</option>
        <option value="__new__" ${isNew?"selected":""}>+ Cadastrar novo${f.ref==='criancas'?'a':''} ${SCHEMAS[f.ref].singular.toLowerCase()}</option>
        ${opts.map(o=>`<option value="${o.id}" ${value===o.id?"selected":""}>${o.nome ? (o.nomeConjuge ? `${o.nome} & ${o.nomeConjuge}` : o.nome) : labelEvento(o.id)}</option>`).join("")}
      </select>
      <div id="quick-new-${f.key}">${isNew ? renderQuickNew(f.key, f.ref) : ""}</div>
      </div>`;
  }
  if(f.type==="checkbox"){
    return `<div class="field" style="display:flex; align-items:center; gap:10px;">
      <input type="checkbox" id="${id}" ${value?"checked":""} onchange="formState['${f.key}']=this.checked" style="width:18px; height:18px;">
      <label for="${id}" style="margin:0;">${f.label}</label>
      </div>`;
  }
  if(f.type==="tags"){
    const str = Array.isArray(value) ? value.join(", ") : (value||"");
    return `<div class="field"><label>${f.label}</label>
      <input id="${id}" type="text" value="${str}" oninput="formState['${f.key}']=this.value.split(',').map(s=>s.trim()).filter(Boolean)">
      </div>`;
  }
  return `<div class="field"><label>${f.label}</label><input id="${id}" type="${f.type}" value="${value||""}" oninput="formState['${f.key}']=this.value"></div>`;
}

function onRefChange(fKey, ref, val){
  formState[fKey] = val;
  if(fKey==="clienteId"){
    refreshFormFields();
    return;
  }
  const container = document.getElementById(`quick-new-${fKey}`);
  if(val === "__new__"){
    if(!formState[`_quickNew_${fKey}`]) formState[`_quickNew_${fKey}`] = {};
    container.innerHTML = renderQuickNew(fKey, ref);
  } else {
    container.innerHTML = "";
    delete formState[`_quickNew_${fKey}`];
  }
}
function renderQuickNew(fKey, ref){
  const qf = QUICK_FIELDS[ref];
  if(!qf) return "";
  const quick = formState[`_quickNew_${fKey}`] || {};
  return `<div class="quick-new-box">
    <div style="font-size:12px;color:var(--muted);margin:10px 0 8px;">Dados d${ref==='criancas'?'a nova criança':'o novo cliente'}:</div>
    ${qf.map(q=>`<div class="field"><label>${q.label}</label><input type="${q.type}" value="${quick[q.key]||""}" oninput="formState['_quickNew_${fKey}']['${q.key}']=this.value"></div>`).join("")}
  </div>`;
}


async function saveDoc(){
  const col = formState._col;
  const id = formState._id;
  const schema = SCHEMAS[col];
  const data = {};

  for(const f of camposVisiveis(schema)){
    let val = formState[f.key];

    if(val === "__new__"){
      const ref = f.ref;
      const quick = formState[`_quickNew_${f.key}`] || {};
      const qFields = QUICK_FIELDS[ref] || [];
      const missingQuick = qFields.filter(q=>q.required && !quick[q.key]);
      if(missingQuick.length){
        toast(`Preencha: ${missingQuick.map(q=>q.label).join(", ")}`);
        return;
      }
      const quickData = {};
      qFields.forEach(q=> quickData[q.key] = quick[q.key] || "");
      if(ref === "criancas" && data.clienteId){
        quickData.clientePaiId = data.clienteId; // já vincula a criança ao cliente do evento
      }
      quickData.criadoEm = new Date().toISOString();
      try{
        const newDocRef = await db.collection(ref).add(quickData);
        val = newDocRef.id;
      }catch(err){
        console.error(err);
        toast(`Erro ao cadastrar ${SCHEMAS[ref].singular.toLowerCase()} automaticamente.`);
        return;
      }
    }

    data[f.key] = val ?? (f.type==="tags" ? [] : f.type==="checkbox" ? false : "");
  }

  // atualiza o cônjuge do cliente, se informado no evento de casamento
  if(col === "eventos" && data.clienteId && data.conjugeEvento){
    try{ await db.collection("clientes").doc(data.clienteId).update({ nomeConjuge: data.conjugeEvento }); }
    catch(err){ console.error("[clientes] erro ao atualizar cônjuge:", err); }
  }

  // vincula/cria automaticamente o registro em "Casamentos" para eventos de casamento
  if(col === "eventos" && (data.tipo==="casamento_civil" || data.tipo==="casamento_religioso") && data.clienteId){
    const cliente = state.clientes.find(c=>c.id===data.clienteId);
    const conjugeFinal = data.conjugeEvento || cliente?.nomeConjuge || "";
    const existente = state.casamentos.find(c=>c.clienteId===data.clienteId);
    if(existente){
      data.casamentoId = existente.id;
      if(conjugeFinal && !existente.conjuge){
        try{ await db.collection("casamentos").doc(existente.id).update({ conjuge: conjugeFinal }); }
        catch(err){ console.error(err); }
      }
    } else {
      try{
        const novoCasamento = await db.collection("casamentos").add({
          nomeCasal: cliente ? cliente.nome : "Casal", conjuge: conjugeFinal,
          dataCasamento: data.data || "", clienteId: data.clienteId,
          observacoes: "", criadoEm: new Date().toISOString()
        });
        data.casamentoId = novoCasamento.id;
      }catch(err){
        console.error("[casamentos] erro ao criar automaticamente:", err);
        // não bloqueia o salvamento do evento por causa disso
      }
    }
  }

  const missing = camposVisiveis(schema).filter(f=>f.required && !data[f.key]);
  if(missing.length){
    toast(`Preencha: ${missing.map(f=>f.label).join(", ")}`);
    return;
  }

  try{
    if(id){
      await db.collection(col).doc(id).update(data);
      toast(`${schema.singular} atualizado.`);
    } else {
      data.criadoEm = new Date().toISOString();
      await db.collection(col).add(data);
      toast(`${schema.singular} criado.`);
    }
    closeModal();
  }catch(err){
    console.error(err);
    toast("Erro ao salvar. Veja o console.");
  }
}

async function deleteDoc(col, id){
  if(!confirm("Tem certeza que deseja excluir?")) return;
  await db.collection(col).doc(id).delete();
  toast("Excluído.");
}
</script>
